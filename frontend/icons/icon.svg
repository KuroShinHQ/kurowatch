<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="70%" stop-color="#0088aa"/>
      <stop offset="100%" stop-color="#003642"/>
    </radialGradient>
  </defs>
  <!-- Arkaplan -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- Dış göz -->
  <ellipse cx="256" cy="256" rx="180" ry="110" fill="none" stroke="#00d4ff" stroke-width="14" opacity="0.9"/>
  <!-- Göz beyazı -->
  <ellipse cx="256" cy="256" rx="160" ry="92" fill="#0d0d1a"/>
  <!-- İris -->
  <circle cx="256" cy="256" r="80" fill="url(#eyeGrad)"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="36" fill="#0d0d1a"/>
  <!-- Highlight -->
  <circle cx="232" cy="232" r="14" fill="#ffffff" opacity="0.9"/>
  <circle cx="276" cy="280" r="6" fill="#ffffff" opacity="0.6"/>
  <!-- Glow -->
  <ellipse cx="256" cy="256" rx="180" ry="110" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5" filter="blur(8px)"/>
</svg>
